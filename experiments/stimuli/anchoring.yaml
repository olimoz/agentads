# Anchoring — Jacowitz & Kahneman (1995), Many Labs replication
#
# Three sets of items:
#   1. benchmark_items: exact Many Labs stimuli (Everest, SF-NY, Chicago, babies).
#      LLMs likely know these answers, so this tests anchoring DESPITE knowledge.
#      Provides apples-to-apples comparison with human baselines.
#   2. classic_items: debatable-answer replacements (languages, muscles, Indonesia,
#      galaxies). Tests anchoring under genuine uncertainty, like humans experienced.
#   3. product: enterprise monitoring pricing with format mini-test.

experiment: anchoring

# Exact Many Labs stimuli — apples-to-apples human comparison
benchmark_items:
  - name: everest_height
    high: |
      Mount Everest is shorter than 45,500 feet. How tall do you think Mount Everest is?
      Provide a single number in feet as your estimate.
    low: |
      Mount Everest is taller than 2,000 feet. How tall do you think Mount Everest is?
      Provide a single number in feet as your estimate.
    true_value: 29029
    human_d: 1.159
  - name: sf_ny_distance
    high: |
      The distance from San Francisco to New York City is shorter than 6,000 miles. How far do you think it is?
      Provide a single number in miles as your estimate.
    low: |
      The distance from San Francisco to New York City is longer than 1,500 miles. How far do you think it is?
      Provide a single number in miles as your estimate.
    true_value: 2572
    human_d: 1.780
  - name: chicago_population
    high: |
      The population of Chicago is less than 5,000,000. What do you think the population of Chicago is?
      Provide a single number as your estimate.
    low: |
      The population of Chicago is more than 200,000. What do you think the population of Chicago is?
      Provide a single number as your estimate.
    true_value: 2746388
    human_d: 2.298
  - name: us_babies_per_day
    high: |
      Less than 50,000 babies are born per day in the United States. How many babies do you think are born in the U.S. each day?
      Provide a single number as your estimate.
    low: |
      More than 100 babies are born per day in the United States. How many babies do you think are born in the U.S. each day?
      Provide a single number as your estimate.
    true_value: 10267
    human_d: 2.186

classic_items:
  - name: world_languages
    high: |
      There are fewer than 25,000 living languages currently spoken in the world. How many living languages do you think are spoken in the world today?
      Provide a single number as your estimate.
    low: |
      There are more than 800 living languages currently spoken in the world. How many living languages do you think are spoken in the world today?
      Provide a single number as your estimate.
    debatable_range: "5,000–10,000 (depends on language vs dialect distinction)"

  - name: human_muscles
    high: |
      The human body has fewer than 4,000 muscles. How many muscles do you think are in the human body?
      Provide a single number as your estimate.
    low: |
      The human body has more than 100 muscles. How many muscles do you think are in the human body?
      Provide a single number as your estimate.
    debatable_range: "600–840 (depends on how sub-parts are counted)"

  - name: indonesia_islands
    high: |
      The nation of Indonesia comprises fewer than 75,000 islands. How many islands do you think make up Indonesia?
      Provide a single number as your estimate.
    low: |
      The nation of Indonesia comprises more than 2,000 islands. How many islands do you think make up Indonesia?
      Provide a single number as your estimate.
    debatable_range: "13,000–18,000 (depends on tidal island definitions)"

  - name: observable_galaxies
    high: |
      There are fewer than 100 trillion galaxies in the observable universe. How many galaxies do you think are in the observable universe?
      Provide a single number as your estimate.
    low: |
      There are more than 5 billion galaxies in the observable universe. How many galaxies do you think are in the observable universe?
      Provide a single number as your estimate.
    debatable_range: "200 billion–20 trillion (depends on instruments and modelling)"

