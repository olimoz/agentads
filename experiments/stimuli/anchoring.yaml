human_baseline:
  # Many Labs used different items (Everest, SF-NY, Chicago, babies) where
  # humans don't know the answers. Effect sizes were very large:
  #   Everest d=1.16, SF-NY d=1.78, Chicago d=2.30, Babies d=2.19
  # These serve as a reference for anchoring magnitude under uncertainty.
  # Our items are different, so comparison is directional not exact.
  many_labs_d_range: [1.16, 2.30]
  many_labs_d_mean: 1.86
